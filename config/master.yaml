# ==========================================
# CryptoBot Master Configuration
# ==========================================

# 1. GLOBAL TRADING PARAMETERS
# Every service reads these to know what we are trading and when.
trading:
  symbols:
    - BTCUSDT
    - ETHUSDT
    - ADAUSDT
  timeframes:
    - 1m   # 1-minute (For fast testing)
    - 5m   # 5-minute
    - 1h   # 1-hour
    # - 1d  # Uncomment to trade daily candles

# 2. THE PAST (Historian Settings)
past:
  exchange_api: "https://api.binance.com/api/v3/klines"
  warmup_candles: 10000        # How many candles to pull on startup
  sync_interval_hours: 1     # How often to run deep historical backups

# 3. THE PRESENT (Oracle & Engine Settings)
present:
  exchange_ws: "wss://stream.binance.com:9443/stream"
  signal_threshold: 0.55     # Master score needed to trigger a BUY/SELL

  deep_analyze:
    resistance_buffer_pct: 0.005 # 0.5% gap required
    volume_multiplier: 1.5       # Need 50% more volume than average
    max_rsi_for_buy: 68          # Don't buy if RSI > 68

  weights:
    "1m": 0.1
    "5m": 0.2
    "1h": 0.7                # Heavily weight the 1-hour trend

  pattern_weights:
    hammer: 0.8
    bullish_engulfing: 0.9
    morning_star: 0.9
    three_white_soldiers: 0.8
    shooting_star: 0.8
    bearish_engulfing: 0.9
    evening_star: 0.9
    three_black_crows: 0.8

  indicator_weights:
    rsi_oversold: 0.7
    rsi_overbought: 0.7
    ema_golden_cross: 0.85
    ema_death_cross: 0.85

# 4. THE BROKER (Portfolio & Notifications)
broker:
  starting_balance_usd: 0.0  # We will set this from the Vault's portfolio.json
  max_risk_per_trade_pct: 0.05  # Never risk more than 5% of portfolio on one signal
  notifications:
    telegram_enabled: false     # We will turn this to 'true' later!
    telegram_token: ""
    telegram_chat_id: ""

# 5. THE VAULT (Storage & Recovery)
vault:
  database_path: "crypto_pool/cryptobot.db"
  portfolio_path: "crypto_pool/portfolio.json"
  auto_backup: true          # Will copy the DB if the app crashes

broker:
  starting_balance_usd: 100.0
  # Strategy Settings
  targets:
    profit_pct: 6.0     # Notify to SELL if up 6%
    stop_loss_pct: 2.0   # Notify to SELL if down 2% (Safety)
    dip_buy_pct: 0.08     # Notify to BUY if price is 8% below recent high
    high_confidence_threshold: 0.85
  notifications:
    cooldown_seconds: 900
    whatsapp_enabled: true
    phone_number: "+51972711829"  # Your number including the + and country code
    api_key: "8338715"

    discord_webhook_url: "https://discord.com/api/webhooks/1496487052127244400/THa-e2TLnLAKLZ-yl_RR613yNevQ39S5Qbo3t7B5I6zR03HY4n7dM2CmbOs8eSPDPF-Z"
    cooldown_seconds: 300