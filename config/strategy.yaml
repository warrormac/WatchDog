signal_threshold: 0.55   # minimum confidence to emit a signal

pattern_weights:
  bullish_engulfing: 0.8
  morning_star:      0.9
  hammer:            0.6
  head_and_shoulders: 0.85
  inverted_hammer:   0.6
  doji:              0.3

indicator_weights:
  rsi_oversold:      0.7   # RSI < 30
  rsi_overbought:    0.7   # RSI > 70
  macd_crossover:    0.75
  bb_squeeze:        0.5
  ema_golden_cross:  0.85  # EMA9 crosses EMA21 upward

timeframe_weights:
  "1m": 0.1
  "5m": 0.2
  "15m": 0.3
  "1h": 0.25
  "4h": 0.15
